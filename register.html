<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(177, 33, 57);
            font-family: -apple-system, BlinkMacSystemFont,
                'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                font-size: 20px;
        }

        main {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        div {
            width: 500px;
            height: 500px;
            padding-top: 20px;
            background-color: rgb(88, 19, 31);
            align-content: center;
            text-align: center;
        }
        #p1 {
            padding-right: 140px;
        }
        #p2 {
            padding-right: 145px;
        }
        #p3 {
            padding-right: 110px;
        }
        #p7 {
            padding-right: 60px;
        }
        #p4 {
            padding-right: 65px;
        }
        #p5 {
            padding-right: 170px;
        }
        #p6 {
            padding-right: 140px;
        }
        .i1{
            margin-left: 50px;
        }
        .i2 {
            margin-left: 50px;
        }
    </style>
</head>

<body>
    <main>
        <div>
            <form>
                <p id="p1"> <label for="name">Name:</label>
                    <input type="text" placeholder="your name" class="i1">
                </p>
                <p id="p2"><label for="mail">Email:</label>
                    <input type="mail" placeholder="your email" class="i2">
                </p>
                <p id="p3"><label for="password">Password:</label>
                    <input type="password" class="i3">
                </p>
                <p id="p7"><label for="number">Phone Number:</label>
                    <input type="number" class="i4">
                </p>
                <p id="p4">
                    <span>Gender:</span>
                    <label for="gender">male</label>
                    <input type="radio" name="gender" id="gender">
                    <label for="gender">female</label>
                    <input type="radio" name="gender" id="gender">
                    <label for="gender">other</label>
                    <input type="radio" name="gender" id="gender">

                </p>
                <p id="p5">
                    <span>Language</span>
                    <select>
                        <option>Select language</option>
                        <option>English</option>
                        <option>Yoruba</option>
                        <option>Hausa</option>
                        <option>Igbo</option>
                        <option>Nigerian Pidgin</option>
                    </select>
                </p>
                <p id="p6">
                    <label>About:</label>
                    <input type="text" placeholder="Write about yourself">
                </p>

            </form>
        </div>
    </main>
</body>

</html>
