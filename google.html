<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/2a3aa8d04c.js" crossorigin="anonymous"></script>
    <title>google</title>
    <style>
         input{
          width: 500px;
          border: none;
      }  
      input:focus {
          outline: none;
          border-radius: none;
      }
      h1 {
          font-size: 100px;
          text-align: center;
          font-family: -apple-system, BlinkMacSystemFont, 
          'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
          font-weight: 350;
      }
        section{
            border:1px solid black;
            width: fit-content;
            border-radius: 10px;
            padding: 10px;
            align-items: center;
            margin-left: 400px;
        }
        section:focus-within div {
            display: inherit;
        }
        div {
            display: none; }
            
            
    </style>
</head>
<body>
    <h1>
        <span style="color: red;">G</span><span style="color: blue;">o</span><span style="color: orange;">o</span><span style="color: green;">g</span><span style="color: red;">l</span><span style="color: blue;">e</span>
    </h1>
    <section>
        <i class="fa fa-search"></i>
        <input type="text">
        <i class="fa fa-microphone-slash"></i>
    <div>
       <h6>abcd</h6>
       <h6>abcd</h6>
       <h6>abcd</h6>
       <h6>abcd</h6>
       <h6>abcd</h6>
       <h6>abcd</h6>
        
      </div>
 </section>

</body>
</html>
